<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Story Master Hub — Epic Quest</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
<style>
/* ══════════════════════════════════════════════
   RESET & TOKENS — iPad-first, legibility-first
   ══════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f3f2ee;--surface:#fff;--surface2:#f9f8f5;
  --ink:#1a1a1a;--ink2:#444;--ink3:#666;--ink4:#999;
  --border:#ddd9d0;--border2:#ccc8be;
  --gold:#8a6f0a;--gold-light:#f0ead0;--gold-pale:#f8f5e8;
  --red:#b02828;--red-light:#fae8e8;
  --blue:#2858a0;--blue-light:#e6eefc;
  --green:#247038;--green-light:#e4f2ea;
  --purple:#6030a0;--purple-light:#ede6fa;
  --orange:#a06010;--orange-light:#faf0e2;
  --sidebar:#1c1d2e;--sidebar2:#282940;--sidebar3:#333455;
  --sidebar-text:#b0b1c8;--sidebar-dim:#7a7b9a;
  --r:8px;--r-lg:12px;
  --font:system-ui,-apple-system,'Segoe UI',sans-serif;
  --serif:Georgia,serif;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);font-size:15px;color:var(--ink);background:var(--bg);display:flex}

/* ══════════════════════════════════════════════
   SIDEBAR — touch-friendly, no clutter
   ══════════════════════════════════════════════ */
.sidebar{
  width:180px;min-width:180px;background:var(--sidebar);
  display:flex;flex-direction:column;padding:16px 8px;
  overflow-y:auto;user-select:none;-webkit-overflow-scrolling:touch;
}
.sidebar::-webkit-scrollbar{display:none}
.sb-brand{text-align:center;margin-bottom:4px}
.sb-brand-name{color:#c9a84c;font-size:14px;font-weight:800;letter-spacing:2px}
.sb-brand-sub{color:var(--sidebar-dim);font-size:10px;letter-spacing:.5px}
.sb-campaign{
  background:var(--sidebar2);border:1px solid var(--sidebar3);
  border-radius:var(--r);padding:10px;margin:10px 0 16px;
}
.sb-campaign-label{color:var(--sidebar-dim);font-size:9px;letter-spacing:.8px;font-weight:700}
.sb-campaign-name{color:#e8e8f0;font-size:13px;font-weight:700;margin-top:3px}
.sb-campaign-session{color:var(--sidebar-text);font-size:11px;margin-top:2px}
.sb-nav{display:flex;flex-direction:column;gap:2px}
.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:12px 10px;border-radius:var(--r);min-height:44px;
  cursor:pointer;border:1px solid transparent;
}
.sb-item:active{background:var(--sidebar2)}
.sb-item.active{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.3)}
.sb-item-icon{font-size:18px;width:22px;text-align:center;flex-shrink:0}
.sb-item-name{font-size:13px;font-weight:600;color:var(--sidebar-text)}
.sb-item.active .sb-item-name{color:#c9a84c}
.sb-divider{border:none;border-top:1px solid var(--sidebar3);margin:12px 4px}
.sb-players{margin-top:auto;padding-top:12px}
.sb-players-label{color:var(--sidebar-dim);font-size:9px;letter-spacing:1px;font-weight:700;text-align:center;margin-bottom:8px}
.sb-player-list{display:flex;justify-content:center;gap:8px}
.sb-player{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;
}
.sb-settings{
  margin-top:12px;padding:10px;border-radius:var(--r);min-height:44px;
  text-align:center;cursor:pointer;border:1px solid var(--sidebar3);
  color:var(--sidebar-dim);font-size:11px;display:flex;align-items:center;justify-content:center;
}
.sb-settings:active{background:var(--sidebar2);color:var(--sidebar-text)}

/* ══════════════════════════════════════════════
   MAIN AREA
   ══════════════════════════════════════════════ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{
  display:flex;align-items:center;gap:12px;
  padding:10px 20px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;min-height:50px;
}
.breadcrumb{font-size:13px;color:var(--ink3)}
.breadcrumb span{color:var(--ink);font-weight:600}
.topbar-spacer{flex:1}
.btn{
  padding:10px 16px;border-radius:var(--r);font-size:13px;
  font-weight:600;font-family:var(--font);cursor:pointer;
  border:1px solid var(--border);background:var(--surface);
  color:var(--ink2);display:inline-flex;align-items:center;gap:6px;
  min-height:44px;
}
.btn:active{background:var(--bg);border-color:var(--border2)}
.btn-gold{background:var(--gold-light);border-color:var(--gold);color:var(--gold)}
.btn-primary{background:var(--gold);border-color:var(--gold);color:#fff}
.btn-primary:active{background:#6a5808}
.content{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{display:none}

/* ══════════════════════════════════════════════
   VIEW SYSTEM
   ══════════════════════════════════════════════ */
.view{display:none}
.view.active{display:block}

/* ══════════════════════════════════════════════
   SECTION HEADERS
   ══════════════════════════════════════════════ */
.section-label{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--gold);margin-bottom:10px}
.section-desc{font-size:14px;color:var(--ink3);margin-bottom:16px;line-height:1.5}

/* ══════════════════════════════════════════════
   CAMPAIGN: BEATS
   ══════════════════════════════════════════════ */
.beats-row{display:flex;gap:8px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.beat-card{
  flex:0 0 190px;background:var(--surface);border:2px solid var(--border);
  border-radius:var(--r-lg);padding:14px 16px;cursor:pointer;
}
.beat-card:active{border-color:var(--gold)}
.beat-card.active{border-color:var(--gold);background:var(--gold-pale)}
.beat-card.dim{opacity:.4}
.beat-card .beat-num{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.5px}
.beat-card .beat-name{font-size:15px;font-weight:700;color:var(--ink);margin-top:4px;font-family:var(--serif)}
.beat-card .beat-status{font-size:11px;color:var(--ink3);margin-top:6px}
.beat-card .beat-bar{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.beat-card .beat-fill{height:100%;background:var(--gold);border-radius:2px}
.beat-connector{flex-shrink:0;display:flex;align-items:center;color:var(--border2);font-size:16px}

/* ══════════════════════════════════════════════
   CAMPAIGN: SCENE CARDS
   ══════════════════════════════════════════════ */
.scenes-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.scenes-header .section-label{margin:0}
.scene-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:24px}
.scene-card{
  background:var(--surface);border:2px solid var(--border);
  border-radius:var(--r-lg);padding:16px;cursor:pointer;
  position:relative;overflow:hidden;
}
.scene-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.scene-card.combat::before{background:var(--red)}
.scene-card.social::before{background:var(--blue)}
.scene-card.exploration::before{background:var(--green)}
.scene-card.revelation::before{background:var(--purple)}
.scene-card.sporadic::before{background:var(--gold)}
.scene-card.sporadic{border-style:dashed}
.scene-badge{display:inline-block;padding:3px 10px;border-radius:var(--r);font-size:11px;font-weight:700;margin-bottom:8px}
.badge-combat{background:var(--red-light);color:var(--red)}
.badge-social{background:var(--blue-light);color:var(--blue)}
.badge-exploration{background:var(--green-light);color:var(--green)}
.badge-revelation{background:var(--purple-light);color:var(--purple)}
.badge-sporadic{background:var(--gold-pale);color:var(--gold)}
.scene-status{float:right;font-size:10px;font-weight:600;padding:3px 8px;border-radius:var(--r)}
.status-debrief{background:var(--green-light);color:var(--green)}
.status-active{background:var(--gold-pale);color:var(--gold)}
.status-ready{background:var(--bg);color:var(--ink3)}
.scene-card .scene-name{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:6px;font-family:var(--serif)}
.scene-card .scene-detail{font-size:13px;color:var(--ink3);line-height:1.5;margin-bottom:2px}
.scene-flag{margin-top:10px;padding:8px 10px;border-radius:var(--r);font-size:12px;line-height:1.4;border:1px dashed}
.flag-consequence{background:rgba(176,40,40,.04);border-color:var(--red);color:var(--red)}
.flag-personal{background:rgba(96,48,160,.04);border-color:var(--purple);color:var(--purple)}

/* ══════════════════════════════════════════════
   SCENE BUILDER
   ══════════════════════════════════════════════ */
.builder-layout{display:flex;gap:16px}
.builder-main{flex:1;min-width:0}
.builder-side{width:280px;min-width:280px}
@media(max-width:900px){
  .builder-layout{flex-direction:column}
  .builder-side{width:100%;min-width:0}
}
.builder-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.builder-tab{
  padding:10px 16px;border-radius:var(--r);font-size:13px;
  font-weight:600;cursor:pointer;border:2px solid var(--border);
  background:var(--surface);color:var(--ink3);min-height:44px;
  display:flex;align-items:center;
}
.builder-tab:active{background:var(--bg)}
.builder-tab.active{background:var(--gold-light);border-color:var(--gold);color:var(--gold)}
.builder-tab.tab-debrief{color:var(--red)}
.builder-tab.tab-debrief.active{background:var(--red-light);border-color:var(--red);color:var(--red)}
.builder-panel{display:none}
.builder-panel.active{display:block}
.form-section{margin-bottom:20px}
.form-label{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--ink3);margin-bottom:8px}
.form-input{
  width:100%;padding:12px 14px;border:2px solid var(--border);
  border-radius:var(--r);font-size:15px;font-family:var(--font);
  color:var(--ink);background:var(--surface2);resize:vertical;
}
.form-input:focus{outline:none;border-color:var(--gold)}
.form-input::placeholder{color:var(--ink4)}
textarea.form-input{min-height:70px;line-height:1.5}
.stakes-row{display:flex;gap:10px}
@media(max-width:700px){.stakes-row{flex-direction:column}}
.stake-box{flex:1;padding:14px;border-radius:var(--r-lg);border:2px dashed}
.stake-fail{background:rgba(176,40,40,.03);border-color:var(--red)}
.stake-win{background:rgba(36,112,56,.03);border-color:var(--green)}
.stake-label{font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:8px}
.stake-fail .stake-label{color:var(--red)}
.stake-win .stake-label{color:var(--green)}
.stake-box .form-input{background:transparent;border-color:transparent}
.stake-box .form-input:focus{border-color:inherit}

/* TYPE SELECTOR — color dots, no emoji */
.type-selector{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.type-option{
  padding:10px 18px;border-radius:var(--r);border:2px solid var(--border);
  cursor:pointer;font-size:14px;font-weight:600;background:var(--surface);
  min-height:44px;display:flex;align-items:center;gap:8px;color:var(--ink2);
}
.type-option .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.type-option.selected{border-width:2px}
.type-option[data-type="combat"] .dot{background:var(--red)}
.type-option[data-type="social"] .dot{background:var(--blue)}
.type-option[data-type="exploration"] .dot{background:var(--green)}
.type-option[data-type="revelation"] .dot{background:var(--purple)}
.type-option[data-type="combat"].selected{border-color:var(--red);background:var(--red-light);color:var(--red)}
.type-option[data-type="social"].selected{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.type-option[data-type="exploration"].selected{border-color:var(--green);background:var(--green-light);color:var(--green)}
.type-option[data-type="revelation"].selected{border-color:var(--purple);background:var(--purple-light);color:var(--purple)}

/* ══════════════════════════════════════════════
   LAIR ACTIONS — checkboxes, not chips
   ══════════════════════════════════════════════ */
.lair-section{padding:14px;border-radius:var(--r-lg);background:var(--orange-light);border:2px dashed var(--orange)}
.lair-check{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:14px;color:var(--ink2);cursor:pointer}
.lair-check input[type="checkbox"]{width:20px;height:20px;accent-color:var(--orange)}
.combat-only{display:none}
.combat-only.visible{display:block}

/* ══════════════════════════════════════════════
   NPC / CREATURE / LOOT CARDS
   ══════════════════════════════════════════════ */
.npc-card,.creature-card,.loot-card{
  background:var(--surface);border:2px solid var(--border);
  border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px;
}
.npc-card .npc-name,.creature-card .creature-name,.loot-card .loot-name{font-size:15px;font-weight:700;font-family:var(--serif)}
.npc-card .npc-role,.creature-card .creature-type,.loot-card .loot-type{font-size:12px;color:var(--ink3);margin-top:2px}
.npc-card .npc-detail,.creature-card .creature-abilities,.loot-card .loot-desc{font-size:13px;color:var(--ink2);margin-top:8px;line-height:1.5}
.npc-card .npc-voice{font-size:14px;color:var(--gold);font-style:italic;margin-top:6px}
.creature-stats-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.creature-stat{padding:4px 10px;border-radius:var(--r);font-size:12px;font-weight:600;background:var(--bg);color:var(--ink2);border:1px solid var(--border)}
.creature-stat.hp{background:var(--red-light);color:var(--red);border-color:var(--red)}
.creature-stat.dmg{background:var(--orange-light);color:var(--orange);border-color:var(--orange)}
.creature-stat.special{background:var(--purple-light);color:var(--purple);border-color:var(--purple)}
.difficulty-tag{display:inline-block;padding:3px 10px;border-radius:var(--r);font-size:11px;font-weight:700}
.diff-easy{background:var(--green-light);color:var(--green)}
.diff-medium{background:var(--orange-light);color:var(--orange)}
.diff-hard{background:var(--red-light);color:var(--red)}
.diff-boss{background:var(--purple-light);color:var(--purple)}
.loot-card .loot-effect{font-size:13px;color:var(--gold);font-style:italic;margin-top:6px;padding:8px 12px;background:var(--gold-pale);border-radius:var(--r)}
.loot-rarity{display:inline-block;padding:3px 10px;border-radius:var(--r);font-size:11px;font-weight:700;float:right}
.rarity-common{background:var(--bg);color:var(--ink3)}
.rarity-uncommon{background:var(--green-light);color:var(--green)}
.rarity-rare{background:var(--blue-light);color:var(--blue)}
.rarity-legendary{background:var(--gold-pale);color:var(--gold)}
.loot-scene-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;margin-top:8px;padding:4px 8px;background:var(--bg);border-radius:var(--r);color:var(--ink3)}

/* VILLAIN */
.villain-card-lib{background:var(--surface);border:2px solid var(--red);border-left:5px solid var(--red);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px}
.villain-label{font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--red);margin-bottom:4px}
.villain-status{display:inline-block;padding:3px 10px;border-radius:var(--r);font-size:11px;font-weight:700}
.vs-active{background:var(--red-light);color:var(--red)}
.vs-prepared{background:var(--gold-pale);color:var(--gold)}

/* DIFFICULTY METER */
.difficulty-meter{padding:12px 14px;border-radius:var(--r-lg);border:2px solid var(--border);background:var(--surface2);margin-top:12px}
.difficulty-meter .dm-label{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--ink3);margin-bottom:8px}
.dm-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:6px}
.dm-fill{height:100%;border-radius:4px}
.dm-fill.medium{background:var(--orange);width:55%}
.dm-text{font-size:12px;display:flex;justify-content:space-between}

/* ══════════════════════════════════════════════
   LIBRARY
   ══════════════════════════════════════════════ */
.lib-category-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.lib-cat-tab{
  padding:10px 18px;border-radius:var(--r);font-size:13px;
  font-weight:600;cursor:pointer;border:2px solid var(--border);
  background:var(--surface);color:var(--ink3);min-height:44px;
  display:flex;align-items:center;gap:6px;
}
.lib-cat-tab:active{background:var(--bg)}
.lib-cat-tab.active{border-color:var(--gold);color:var(--gold);background:var(--gold-pale)}
.lib-cat-tab .tab-count{font-size:11px;background:var(--bg);padding:2px 8px;border-radius:10px;color:var(--ink4);font-weight:700}
.lib-cat-tab.active .tab-count{background:rgba(138,111,10,.12);color:var(--gold)}
.lib-content{display:none}
.lib-content.active{display:block}
.library-layout{display:flex;gap:16px;height:calc(100vh - 220px)}
@media(max-width:900px){
  .library-layout{flex-direction:column;height:auto}
  .library-list{width:100% !important;min-width:0 !important;max-height:300px}
}
.library-list{
  width:300px;min-width:300px;background:var(--surface);
  border:2px solid var(--border);border-radius:var(--r-lg);overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.library-list::-webkit-scrollbar{display:none}
.library-search{padding:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
.library-search input{
  width:100%;padding:10px 12px;border:2px solid var(--border);
  border-radius:var(--r);font-size:14px;font-family:var(--font);
}
.library-search input:focus{outline:none;border-color:var(--gold)}
.library-item{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;min-height:44px}
.library-item:active{background:var(--bg)}
.library-item.active{background:var(--gold-pale);border-left:4px solid var(--gold)}
.library-item .li-name{font-size:14px;font-weight:600}
.library-item .li-role{font-size:12px;color:var(--ink3);margin-top:2px}
.library-item .li-status{float:right}
.library-detail{
  flex:1;background:var(--surface);border:2px solid var(--border);
  border-radius:var(--r-lg);padding:24px;overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.library-detail::-webkit-scrollbar{display:none}
.detail-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--ink4);font-size:15px}
.detail-header{margin-bottom:20px}
.detail-name{font-size:22px;font-weight:700;font-family:var(--serif);color:var(--ink)}
.detail-role{font-size:14px;color:var(--ink3);margin-top:3px}
.detail-section{margin-bottom:16px}
.detail-section-label{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--ink3);margin-bottom:6px}
.detail-section-value{font-size:14px;color:var(--ink);line-height:1.6}
.detail-voice{
  font-size:15px;color:var(--gold);font-style:italic;
  padding:14px 18px;background:var(--gold-pale);border-radius:var(--r);
  border-left:4px solid var(--gold);margin-top:10px;font-family:var(--serif);
}
.creature-terrain{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--green);margin-right:12px}

/* ══════════════════════════════════════════════
   PLAYER CARDS
   ══════════════════════════════════════════════ */
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.player-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--r-lg);padding:18px 20px}
.player-card-header{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.player-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800}
.player-card-name{font-size:18px;font-weight:700;font-family:var(--serif)}
.player-card-class{font-size:13px;color:var(--ink3)}
.player-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.player-tag{padding:4px 10px;border-radius:var(--r);font-size:12px;font-weight:600;background:var(--bg);color:var(--ink2);border:1px solid var(--border)}
.player-tag.faction{background:var(--gold-pale);color:var(--gold);border-color:var(--gold)}
.player-objective{padding:10px 12px;border-radius:var(--r);background:var(--purple-light);border:1px dashed var(--purple);font-size:13px;color:var(--purple);line-height:1.5;margin-top:10px}
.player-objective-label{font-weight:700;font-size:10px;letter-spacing:.5px;margin-bottom:4px}
.echo-tracker{display:flex;align-items:center;gap:10px;margin-top:12px;padding:8px 12px;background:var(--gold-pale);border-radius:var(--r)}

<script>
/* DB LAYER */
var DB_PREFIX='eqsm_';
var DB_TABLES=['campaign','sessions','scenes','npcs','villains','bestiary','loot','players'];
function dbKey(t){return DB_PREFIX+t}
function dbLoad(t){try{var d=localStorage.getItem(dbKey(t));return d?JSON.parse(d):null}catch(e){return null}}
function dbSave(t,d){try{localStorage.setItem(dbKey(t),JSON.stringify(d));return true}catch(e){alert('Error guardando (¿localStorage lleno?): '+e.message);return false}}
function dbGetAll(t){return dbLoad(t)||[]}
function dbGetById(t,id){return dbGetAll(t).find(function(i){return i.id===id})||null}
function dbCreate(t,item){var items=dbGetAll(t);if(!item.id)item.id=t.substring(0,3)+'-'+Date.now().toString(36);items.push(item);dbSave(t,items);return item}
function dbUpdate(t,id,up){var items=dbGetAll(t);var idx=items.findIndex(function(i){return i.id===id});if(idx===-1)return;Object.keys(up).forEach(function(k){items[idx][k]=up[k]});dbSave(t,items);return items[idx]}
function dbDelete(t,id){dbSave(t,dbGetAll(t).filter(function(i){return i.id!==id}))}
function seedIfEmpty(){if(dbLoad('_init'))return;DB_TABLES.forEach(function(t){if(!dbLoad(t))dbSave(t,t==='campaign'?null:[])});
  // Seed base bestiary into the library so the user starts with reusable creatures
  if(typeof GAMEDATA!=='undefined'&&GAMEDATA.baseBestiary){var best=GAMEDATA.baseBestiary.map(function(c){var copy=JSON.parse(JSON.stringify(c));return copy});dbSave('bestiary',best)}
  dbSave('_init',true)}
seedIfEmpty();

/* STATE */
var currentView='campaign',selectedLibTab='npcs',selectedLibItem=null,selectedSceneId=null,selectedBeatIdx=0;
var combat=null,expandedUnits={};
var G=(typeof GAMEDATA!=='undefined')?GAMEDATA:null;

/* HELPERS */
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,4)}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function resolvePlayer(p){if(!p)return null;var cls=G?G.classes.find(function(c){return c.id===p.classId}):null;var sub=cls?cls.subclasses.find(function(s){return s.id===p.subclassId}):null;var kit=G?G.kits.find(function(k){return k.id===p.kitId}):null;var fac=G?G.factions.find(function(f){return f.id===p.factionId}):null;var ab=[];if(cls)cls.abilities.forEach(function(a){ab.push(a)});if(sub)sub.abilities.forEach(function(a){ab.push(a)});if(kit)ab.push({name:kit.ability.name,type:'Kit',desc:kit.ability.desc,cost:kit.ability.cost});return{id:p.id,name:p.name,initial:p.initial||p.name.charAt(0),bg:p.bg||'#444',fg:p.fg||'#fff',img:p.img||'',echo:p.echo||0,cls:cls?cls.nameEs:(p.classId||'?'),sub:sub?sub.name:'',kit:kit?kit.name:'',plano:p.plano||1,faction:fac?fac.name:(p.factionId||''),factionColor:fac?fac.color:'#666',hp:(G?G.rules.hpBase:10)+(kit?kit.hpBonus:0),aenRegen:(G?G.rules.aenPerTurn:2)+(kit?kit.aenBonus:0),abilities:ab,backstory:p.backstory||''}}
function hpColor(pct){if(pct>60)return'var(--green)';if(pct>25)return'var(--orange)';return'var(--red)'}
function diffLabel(d){return{easy:'Fácil',medium:'Medio',hard:'Duro',boss:'Jefe'}[d]||d}
function avatarHtml(p,size){var s=size||'';var st='background:'+(p.bg||'#444')+';color:'+(p.fg||'#fff')+';';if(p.img)return '<div class="avatar-img" style="background-image:url('+esc(p.img)+');'+s+'"></div>';return '<div class="sb-player" style="'+st+s+'">'+(p.initial||(p.name?p.name.charAt(0):'?'))+'</div>'}

/* GLOBAL CLICK HANDLER */
document.addEventListener('click',function(e){
  var el=e.target.closest('[data-action]');if(!el)return;
  var a=el.dataset.action,t=el.dataset.type,id=el.dataset.id||null;
  if(a==='open-modal'){e.preventDefault();openModal(t,id)}
  if(a==='nav'){nav(t)}
  if(a==='delete-item'){e.stopPropagation();if(confirm('¿Eliminar?')){dbDelete(t,id);selectedLibItem=null;renderView(currentView)}}
  if(a==='select-lib'){selectedLibItem=id;renderLibrary()}
  if(a==='select-scene'){openSceneBuilder(id)}
  if(a==='select-beat'){selectedBeatIdx=parseInt(el.dataset.idx);renderCampaign()}
  if(a==='start-combat'){e.stopPropagation();startCombatFromScene(id)}
  if(a==='save-debrief'){saveDebrief(id)}
  if(a==='add-beat'){addBeat()}
  if(a==='del-beat'){e.stopPropagation();delBeat(parseInt(el.dataset.idx))}
  if(a==='add-echo'){adjustEcho(id,1)}
  if(a==='sub-echo'){adjustEcho(id,-1)}
  if(a==='next-turn'){nextTurn()}
  if(a==='end-combat'){endCombat()}
  if(a==='expand-unit'){toggleExpand(id)}
  if(a==='use-lair'){useLairAction(id)}
  if(a==='add-echo-tracker'){addEchoTracker(id)}
  if(a==='toggle-move'){toggleMove(el.dataset.villainId,el.dataset.moveText)}
  if(a==='adjust-hp'){var v=parseInt(document.getElementById('hp-'+id).value)||0;var sign=parseInt(el.dataset.sign);adjustHp(id,v*sign);document.getElementById('hp-'+id).value=''}
  if(a==='close-modal'){closeModal()}
  if(a==='save-modal'){saveModal(el.dataset.type,el.dataset.id==='null'?null:el.dataset.id)}
  if(a==='export-db'){exportDB(t)}
  if(a==='export-all'){exportAll()}
  if(a==='reset-all'){if(confirm('¿Borrar TODO y reiniciar?')){DB_TABLES.forEach(function(x){localStorage.removeItem(dbKey(x))});localStorage.removeItem(dbKey('_init'));location.reload()}}
  if(a==='add-to-combat'){openAddUnitModal()}
  if(a==='close-builder'){selectedSceneId=null;nav('campaign')}
  if(a==='wizard-next'){saveWizardStep1();sceneWizard.step=2;renderSceneWizard()}
  if(a==='wizard-back'){saveWizardStep1();sceneWizard.step=1;renderSceneWizard()}
  if(a==='wizard-cancel'){sceneWizard=null;closeModal()}
  if(a==='wizard-save'){saveSceneWizard()}
  if(a==='wz-add-creature'){var cid=el.dataset.cid;var ex=sceneWizard.creatureIds.find(function(c){return c.creatureId===cid});if(ex)ex.qty++;else sceneWizard.creatureIds.push({creatureId:cid,qty:1});renderSceneWizard()}
  if(a==='wz-qty'){var cid=el.dataset.cid;var delta=parseInt(el.dataset.delta);var ci=sceneWizard.creatureIds.find(function(c){return c.creatureId===cid});if(ci){ci.qty+=delta;if(ci.qty<=0)sceneWizard.creatureIds=sceneWizard.creatureIds.filter(function(c){return c.creatureId!==cid})}renderSceneWizard()}
  if(a==='wz-add-villain'){var vid=el.dataset.id;if(sceneWizard.villainIds.indexOf(vid)===-1)sceneWizard.villainIds.push(vid);else sceneWizard.villainIds=sceneWizard.villainIds.filter(function(x){return x!==vid});renderSceneWizard()}
  if(a==='wz-remove-villain'){sceneWizard.villainIds=sceneWizard.villainIds.filter(function(x){return x!==el.dataset.id});renderSceneWizard()}
  if(a==='wz-add-npc'){var nid=el.dataset.id;if(sceneWizard.npcIds.indexOf(nid)===-1)sceneWizard.npcIds.push(nid);else sceneWizard.npcIds=sceneWizard.npcIds.filter(function(x){return x!==nid});renderSceneWizard()}
  if(a==='wz-remove-npc'){sceneWizard.npcIds=sceneWizard.npcIds.filter(function(x){return x!==el.dataset.id});renderSceneWizard()}
  if(a==='wz-remove-lair'){sceneWizard.lairActions=sceneWizard.lairActions.filter(function(x){return x!==el.dataset.lair});renderSceneWizard()}
});

/* NAV — Escenas tab removed */
var crumbs={campaign:'📜 <span>Campaña</span>',library:'📖 <span>Biblioteca</span>',players:'👥 <span>Personajes</span>',session:'⚡ <span>Sesión en Vivo</span>',settings:'⚙️ <span>Configuración</span>',scenes:'🎬 <span>Escena</span>'};
function nav(id){currentView=id;document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active')});var t=document.getElementById('view-'+id);if(t)t.classList.add('active');document.querySelectorAll('.sb-item').forEach(function(i){i.classList.remove('active')});var map={campaign:0,library:1,players:2,session:3};var items=document.querySelectorAll('.sb-item');if(map[id]!==undefined&&items[map[id]])items[map[id]].classList.add('active');document.getElementById('breadcrumb').innerHTML=crumbs[id]||'';renderView(id)}
function renderView(id){renderSidebar();if(id==='campaign')renderCampaign();if(id==='scenes')renderSceneBuilder(selectedSceneId);if(id==='library')renderLibrary();if(id==='players')renderPlayers();if(id==='session')renderSession();if(id==='settings')renderSettings()}
function openSceneBuilder(sid){selectedSceneId=sid;nav('scenes')}
function renderSidebar(){var camp=dbLoad('campaign');var ci=document.getElementById('sb-campaign-info');if(ci){ci.innerHTML=camp?'<div class="sb-campaign-label">CAMPAÑA ACTIVA</div><div class="sb-campaign-name">'+esc(camp.name)+'</div>':'<div class="sb-campaign-label">SIN CAMPAÑA</div>'}var pb=document.getElementById('sb-players-bar');if(pb){var pls=dbGetAll('players');if(!pls.length){pb.innerHTML=''}else{var h='<div class="sb-players-label">EN MESA</div><div class="sb-player-list">';pls.forEach(function(p){h+=avatarHtml(p)});h+='</div>';pb.innerHTML=h}}}

/* CAMPAIGN — beats expand to show their scenes */
function renderCampaign(){var el=document.getElementById('campaign-content');if(!el)return;var camp=dbLoad('campaign');if(!camp){el.innerHTML='<div class="empty-state"><div class="empty-state-title">No hay campaña activa</div><div class="empty-state-desc">Crea una campaña para empezar.</div><button class="btn btn-primary" data-action="open-modal" data-type="campaign">Crear campaña</button></div>';return}var arc=(camp.arcs||[])[0]||{beats:[]};var scenes=dbGetAll('scenes');var h='<div class="flex-between" style="margin-bottom:4px"><div class="section-label" style="margin:0">'+esc(camp.name)+'</div><button class="btn" data-action="open-modal" data-type="campaign" data-id="'+camp.id+'">Editar</button></div>';
// Beats as vertical accordion
h+='<div class="beats-accordion">';
(arc.beats||[]).forEach(function(b,i){
  var beatScenes=scenes.filter(function(s){return(b.scenes||[]).indexOf(s.id)>-1});
  var open=i===selectedBeatIdx;
  h+='<div class="beat-block'+(open?' open':'')+'">';
  h+='<div class="beat-head" data-action="select-beat" data-idx="'+i+'">';
  h+='<div><span class="beat-num">BEAT '+(i+1)+'</span> <span class="beat-name">'+esc(b.name)+'</span></div>';
  h+='<div style="display:flex;align-items:center;gap:8px"><span class="beat-count">'+beatScenes.length+' escena'+(beatScenes.length!==1?'s':'')+'</span><span class="beat-arrow">'+(open?'▲':'▼')+'</span><button class="delete-btn" data-action="del-beat" data-idx="'+i+'" title="Eliminar beat">×</button></div>';
  h+='</div>';
  if(open){
    h+='<div class="beat-body">';
    if(!beatScenes.length){h+='<div style="padding:12px;color:var(--ink4);font-size:14px">No hay escenas en este beat.</div>'}
    else{h+='<div class="scene-grid">';beatScenes.forEach(function(s){h+=sceneCard(s)});h+='</div>'}
    h+='<button class="btn btn-primary" style="margin-top:10px" data-action="open-modal" data-type="scene" data-beat="'+b.id+'">+ Nueva escena en este beat</button>';
    h+='</div>';
  }
  h+='</div>';
});
h+='<button class="btn" style="width:100%;justify-content:center;margin-top:8px" data-action="add-beat">+ Agregar beat</button>';
h+='</div>';
// Unassigned scenes
var allAssigned=[];(camp.arcs||[]).forEach(function(a){(a.beats||[]).forEach(function(b){allAssigned=allAssigned.concat(b.scenes||[])})});var unassigned=scenes.filter(function(s){return allAssigned.indexOf(s.id)===-1});
if(unassigned.length){h+='<div class="section-label" style="margin-top:24px">ESCENAS SIN ASIGNAR</div><div class="scene-grid">';unassigned.forEach(function(s){h+=sceneCard(s)});h+='</div>'}
el.innerHTML=h}

function sceneCard(s){var tc=s.type==='combat'?'combat':'social';var h='<div class="scene-card '+tc+'" data-action="select-scene" data-id="'+s.id+'"><span class="scene-badge '+(s.type==='combat'?'badge-combat':'badge-social')+'">'+(s.type==='combat'?'Combate':'Narrativa')+'</span>';if(s.sporadic)h+=' <span style="font-size:11px;color:var(--gold)">(esporádica)</span>';if(s.debrief)h+=' <span style="font-size:11px;color:var(--green)">✓ jugada</span>';h+='<div class="scene-name">'+esc(s.name)+'</div>';if(s.setup&&s.setup.hook)h+='<div class="scene-detail">'+esc(s.setup.hook)+'</div>';if(s.type==='combat')h+='<button class="btn btn-primary" style="margin-top:10px;width:100%;justify-content:center" data-action="start-combat" data-id="'+s.id+'">Iniciar combate</button>';if(s.debrief&&s.debrief.consequences)s.debrief.consequences.forEach(function(c){h+='<div class="scene-flag flag-consequence">⚠ '+esc(c)+'</div>'});h+='</div>';return h}

function addBeat(){var camp=dbLoad('campaign');if(!camp)return;var name=prompt('Nombre del beat:');if(!name)return;if(!camp.arcs)camp.arcs=[{id:'arc-1',name:'Arco I',beats:[]}];camp.arcs[0].beats.push({id:'beat-'+uid(),name:name,scenes:[]});dbSave('campaign',camp);selectedBeatIdx=camp.arcs[0].beats.length-1;renderCampaign()}
function delBeat(idx){var camp=dbLoad('campaign');if(!camp)return;if(!confirm('¿Eliminar este beat? Las escenas quedarán sin asignar.'))return;camp.arcs[0].beats.splice(idx,1);dbSave('campaign',camp);if(selectedBeatIdx>=camp.arcs[0].beats.length)selectedBeatIdx=Math.max(0,camp.arcs[0].beats.length-1);renderCampaign()}

/* LIBRARY */
function renderLibrary(){var el=document.getElementById('library-content');if(!el)return;var tabs=[{id:'npcs',l:'NPCs'},{id:'villains',l:'Villanos'},{id:'bestiary',l:'Bestiario'},{id:'loot',l:'Loot'}];var h='<div class="section-label">BIBLIOTECA</div><div class="lib-category-tabs">';tabs.forEach(function(t){h+='<div class="lib-cat-tab'+(selectedLibTab===t.id?' active':'')+'" data-action="lib-tab" onclick="selectedLibTab=\''+t.id+'\';selectedLibItem=null;renderLibrary()">'+t.l+' <span class="tab-count">'+dbGetAll(t.id).length+'</span></div>'});h+='</div>';var tl={npcs:'NPC',villains:'Villano',bestiary:'Criatura',loot:'Item'}[selectedLibTab];h+='<div style="margin-bottom:12px"><button class="btn btn-primary" data-action="open-modal" data-type="'+selectedLibTab+'">+ Nuevo '+tl+'</button></div>';h+='<div class="library-layout"><div class="library-list"><div class="library-search"><input type="text" placeholder="Buscar..." oninput="filterLib(this.value)"></div><div id="lib-items">';h+=renderLibList(dbGetAll(selectedLibTab));h+='</div></div><div class="library-detail" id="lib-detail">';h+=selectedLibItem?renderLibDetail(selectedLibTab,selectedLibItem):'<div class="empty-state"><div class="empty-state-desc">Selecciona un item</div></div>';h+='</div></div>';el.innerHTML=h}

function unitFromCreature(c,idx,total){return{id:c.id+'-'+uid(),name:c.name+(total>1?' #'+idx:''),type:'creature',hp:c.hp,hpMax:c.hp,dmg:c.dmg||'',resist:c.resist||'',diff:c.difficulty||'medium',abilities:c.abilities||[],actions:{mov:false,act1:false,act2:false}}}

function startCombatFromScene(sid){var scene=dbGetById('scenes',sid);if(!scene)return;var units=[];expandedUnits={};dbGetAll('players').forEach(function(p){units.push(unitFromPlayer(p))});if(scene.participants&&scene.participants.creatureIds)scene.participants.creatureIds.forEach(function(ci){var c=dbGetById('bestiary',ci.creatureId);if(!c)return;for(var i=1;i<=ci.qty;i++)units.push(unitFromCreature(c,i,ci.qty))});combat={name:scene.name,round:1,turnIndex:0,units:units,order:units.map(function(u){return u.id}),lairActions:(scene.lairActions||[]).map(function(la,i){return{id:'la'+i,text:la,used:false}})};nav('session')}

function nextTurn(){if(!combat)return;combat.turnIndex=(combat.turnIndex+1)%combat.order.length;if(combat.turnIndex===0){combat.round++;combat.units.forEach(function(u){u.actions={mov:false,act1:false,act2:false}});combat.lairActions.forEach(function(la){la.used=false})}var nx=combat.units.find(function(u){return u.id===combat.order[combat.turnIndex]});if(nx)nx.actions={mov:false,act1:false,act2:false};renderSession()}

function toggleAction(uid,act){var u=combat.units.find(function(u){return u.id===uid});if(!u)return;u.actions[act]=!u.actions[act];if(u.actions.mov&&u.actions.act1&&u.actions.act2)setTimeout(nextTurn,400);else renderSession()}
function toggleExpand(uid){expandedUnits[uid]=!expandedUnits[uid];renderSession()}
function useLairAction(lid){var la=combat.lairActions.find(function(l){return l.id===lid});if(la)la.used=true;renderSession()}

var sceneWizard=null;

function openSceneWizard(id,beatId){
  var existing=id?dbGetById('scenes',id):null;
  sceneWizard={
    step:1,
    id:id||null,
    beatId:beatId||(existing?null:null),
    name:existing?existing.name:'',
    type:existing?existing.type:'narrative',
    setup:existing?Object.assign({hook:'',conflict:'',stakesFail:'',stakesWin:'',exit:''},existing.setup):{hook:'',conflict:'',stakesFail:'',stakesWin:'',exit:''},
    notes:existing?existing.notes||'':'',
    creatureIds:existing&&existing.participants?JSON.parse(JSON.stringify(existing.participants.creatureIds||[])):[],
    villainIds:existing&&existing.participants?JSON.parse(JSON.stringify(existing.participants.villainIds||[])):[],
    npcIds:existing&&existing.participants?(existing.participants.npcIds||[]).slice():[],
    lairActions:existing?(existing.lairActions||[]).slice():[]
  };
  renderSceneWizard();
}

function renderSceneWizard(){
  var w=sceneWizard;if(!w)return;
  var h='<div class="modal-overlay"><div class="modal"><div class="modal-title">'+(w.id?'Editar':'Crear')+' escena — Paso '+w.step+' de 2</div>';
  // Step indicator
  h+='<div class="wizard-steps"><div class="wizard-step'+(w.step===1?' active':'')+(w.step>1?' done':'')+'">1. Info básica</div><div class="wizard-step'+(w.step===2?' active':'')+'">2. Participantes</div></div>';
  if(w.step===1)h+=renderWizardStep1();
  else h+=renderWizardStep2();
  // Actions
  h+='<div class="modal-actions">';
  if(w.step===1){h+='<button class="btn" data-action="wizard-cancel">Cancelar</button><button class="btn btn-primary" data-action="wizard-next">Siguiente →</button>'}
  else{h+='<button class="btn" data-action="wizard-back">← Anterior</button><button class="btn btn-primary" data-action="wizard-save">Guardar escena</button>'}
  h+='</div></div></div>';
  document.getElementById('modal-root').innerHTML=h;
}

  var userCreatures=dbGetAll('bestiary');
  var userIds={};userCreatures.forEach(function(c){userIds[c.id]=true});

}

    w.npcIds.forEach(function(nid){var n=dbGetById('npcs',nid);if(!n)return;h+='<div class="selected-participant"><div><span class="creature-name">'+esc(n.name)+'</span><div style="font-size:12px;color:var(--ink3)">'+esc(n.role||'')+'</div>'+(n.voice?'<div style="font-size:12px;color:var(--ink4);font-style:italic">"'+esc(n.voice)+'"</div>':'')+'</div><button class="delete-btn" data-action="wz-remove-npc" data-id="'+nid+'">×</button></div>'});
    h+='</div>';
    var npcs=dbGetAll('npcs');
    if(npcs.length){h+='<div class="form-section"><div class="form-label">+ AGREGAR NPC</div><input type="text" class="form-input" placeholder="Buscar NPC..." oninput="filterWizPicker(this.value,\'npcs\')"><div class="wiz-picker" id="wiz-picker-npcs">'+renderWizNpcPicker('')+'</div></div>'}
    else{h+='<div style="font-size:13px;color:var(--ink4);padding:8px 0">No tienes NPCs en tu biblioteca. Créalos primero en Biblioteca → NPCs.</div>'}
  }
  return h;
}

function getCreatureById(id){var c=dbGetById('bestiary',id);if(c)return c;if(G&&G.baseBestiary){var b=G.baseBestiary.find(function(x){return x.id===id});if(b)return b}return null}

function renderDifficultyMeter(){
  var w=sceneWizard;
  var totalHp=0,count=0;
  w.creatureIds.forEach(function(ci){var c=getCreatureById(ci.creatureId);if(c){totalHp+=(c.hp||0)*ci.qty;count+=ci.qty}});
  w.villainIds.forEach(function(vid){var v=dbGetById('villains',vid);if(v){totalHp+=(v.stats?v.stats.hp:0);count++}});
  var players=dbGetAll('players').length||4;
  // Reference: each player can handle ~25 HP comfortably
  var ratio=totalHp/(players*25);
  var label,color,pct;
  if(ratio<0.5){label='Paseo';color='var(--green)';pct=20}
  else if(ratio<1){label='Desafío';color='var(--gold)';pct=50}
  else if(ratio<1.6){label='Peligroso';color='var(--orange)';pct=75}
  else{label='Mortal';color='var(--red)';pct=100}
  if(count===0){label='Sin enemigos';color='var(--ink4)';pct=0}
  var h='<div class="difficulty-meter"><div class="flex-between"><div class="form-label" style="margin:0">DIFICULTAD ESTIMADA</div><div style="font-size:14px;font-weight:700;color:'+color+'">'+label+'</div></div>';
  h+='<div class="diff-meter-bar"><div class="diff-meter-fill" style="width:'+pct+'%;background:'+color+'"></div></div>';
  h+='<div style="font-size:12px;color:var(--ink3);margin-top:4px">'+count+' enemigo'+(count!==1?'s':'')+' · '+totalHp+' HP total · '+players+' jugadores</div></div>';
  return h;
}

function renderWizCreaturePicker(q){
  var w=sceneWizard;
  var creatures=allCreatures();
  if(q)creatures=creatures.filter(function(c){return c.name.toLowerCase().indexOf(q.toLowerCase())>-1});
  if(!creatures.length)return'<div style="font-size:13px;color:var(--ink4);padding:8px">No hay criaturas. Créalas en Biblioteca → Bestiario.</div>';
  var h='';
  creatures.forEach(function(c){
    var already=w.creatureIds.find(function(ci){return ci.creatureId===c.id});
    h+='<div class="wiz-picker-item" data-action="wz-add-creature" data-cid="'+c.id+'"><div><span style="font-weight:600">'+esc(c.name)+'</span>'+(c._base?' <span class="base-lock" title="Del gamedata base">🔒</span>':'')+' <span class="difficulty-tag diff-'+(c.difficulty||'medium')+'">'+diffLabel(c.difficulty)+'</span><div style="font-size:12px;color:var(--ink3)">HP '+c.hp+' · '+esc(c.dmg||'')+'</div></div><span style="color:var(--gold);font-size:18px">'+(already?'✓':'+')+'</span></div>';
  });
  return h;
}
function renderWizVillainPicker(){
  var w=sceneWizard;var villains=dbGetAll('villains');var h='';
  villains.forEach(function(v){var already=w.villainIds.indexOf(v.id)>-1;h+='<div class="wiz-picker-item" data-action="wz-add-villain" data-id="'+v.id+'"><div><span style="font-weight:600;color:var(--red)">'+esc(v.name)+'</span><div style="font-size:12px;color:var(--ink3)">'+esc(v.role||'')+' · HP '+(v.stats?v.stats.hp:'?')+'</div></div><span style="color:var(--gold);font-size:18px">'+(already?'✓':'+')+'</span></div>'});
  return h;
}
function renderWizNpcPicker(q){
  var w=sceneWizard;var npcs=dbGetAll('npcs');
  if(q)npcs=npcs.filter(function(n){return n.name.toLowerCase().indexOf(q.toLowerCase())>-1});
  var h='';
  npcs.forEach(function(n){var already=w.npcIds.indexOf(n.id)>-1;h+='<div class="wiz-picker-item" data-action="wz-add-npc" data-id="'+n.id+'"><div><span style="font-weight:600">'+esc(n.name)+'</span><div style="font-size:12px;color:var(--ink3)">'+esc(n.role||'')+'</div></div><span style="color:var(--gold);font-size:18px">'+(already?'✓':'+')+'</span></div>'});
  return h;
}

function filterWizPicker(q,kind){
  if(kind==='creatures')document.getElementById('wiz-picker-creatures').innerHTML=renderWizCreaturePicker(q);
  if(kind==='npcs')document.getElementById('wiz-picker-npcs').innerHTML=renderWizNpcPicker(q);
}
function toggleWizLair(la){var w=sceneWizard;var i=w.lairActions.indexOf(la);if(i>-1)w.lairActions.splice(i,1);else w.lairActions.push(la)}
function addCustomLair(val){val=val.trim();if(!val)return;if(sceneWizard.lairActions.indexOf(val)===-1)sceneWizard.lairActions.push(val);renderSceneWizard()}

function saveSceneWizard(){
  var w=sceneWizard;
  if(!w.name){alert('La escena necesita un nombre');return}
  var item={name:w.name,type:w.type,status:'ready',sporadic:!w.beatId,
    setup:w.setup,
    participants:{npcIds:w.npcIds,creatureIds:w.creatureIds,villainIds:w.villainIds},
    lairActions:w.lairActions,notes:w.notes,debrief:null};
  // Preserve debrief if editing
  if(w.id){var existing=dbGetById('scenes',w.id);if(existing&&existing.debrief)item.debrief=existing.debrief;dbUpdate('scenes',w.id,item)}
  else{item.id='sce-'+uid();dbCreate('scenes',item);if(w.beatId){var camp=dbLoad('campaign');if(camp){camp.arcs[0].beats.forEach(function(b){if(b.id===w.beatId)b.scenes.push(item.id)});dbSave('campaign',camp)}}selectedSceneId=item.id}
  sceneWizard=null;
  closeModal();
  if(w.id||w.beatId)nav('campaign');else{selectedSceneId=item.id;nav('scenes')}
}

/* INIT */
nav('campaign');

</script>
</body>
</html>
