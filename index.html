<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Story Master Hub — Epic Quest</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
<style>
/* ══════════════════════════════════════════════
   RESET & TOKENS — iPad-first, legibility-first
   ══════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f3f2ee;--surface:#fff;--surface2:#f9f8f5;
  --ink:#1a1a1a;--ink2:#444;--ink3:#666;--ink4:#999;
  --border:#ddd9d0;--border2:#ccc8be;
  --gold:#8a6f0a;--gold-light:#f0ead0;--gold-pale:#f8f5e8;
  --red:#b02828;--red-light:#fae8e8;
  --blue:#2858a0;--blue-light:#e6eefc;
  --green:#247038;--green-light:#e4f2ea;
  --purple:#6030a0;--purple-light:#ede6fa;
  --orange:#a06010;--orange-light:#faf0e2;
  --sidebar:#1c1d2e;--sidebar2:#282940;--sidebar3:#333455;
  --sidebar-text:#b0b1c8;--sidebar-dim:#7a7b9a;
  --r:8px;--r-lg:12px;
  --font:system-ui,-apple-system,'Segoe UI',sans-serif;
  --serif:Georgia,serif;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);font-size:15px;color:var(--ink);background:var(--bg);display:flex}

/* ══════════════════════════════════════════════
   SIDEBAR — touch-friendly, no clutter
   ══════════════════════════════════════════════ */
.sidebar{
  width:180px;min-width:180px;background:var(--sidebar);
  display:flex;flex-direction:column;padding:16px 8px;
  overflow-y:auto;user-select:none;-webkit-overflow-scrolling:touch;
}
.sidebar::-webkit-scrollbar{display:none}
.sb-brand{text-align:center;margin-bottom:4px}
.sb-brand-name{color:#c9a84c;font-size:14px;font-weight:800;letter-spacing:2px}
.sb-brand-sub{color:var(--sidebar-dim);font-size:10px;letter-spacing:.5px}
.sb-campaign{
  background:var(--sidebar2);border:1px solid var(--sidebar3);
  border-radius:var(--r);padding:10px;margin:10px 0 16px;
}
.sb-campaign-label{color:var(--sidebar-dim);font-size:9px;letter-spacing:.8px;font-weight:700}
.sb-campaign-name{color:#e8e8f0;font-size:13px;font-weight:700;margin-top:3px}
.sb-campaign-session{color:var(--sidebar-text);font-size:11px;margin-top:2px}
.sb-nav{display:flex;flex-direction:column;gap:2px}
.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:12px 10px;border-radius:var(--r);min-height:44px;
  cursor:pointer;border:1px solid transparent;
}
.sb-item:active{background:var(--sidebar2)}
.sb-item.active{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.3)}
.sb-item-icon{font-size:18px;width:22px;text-align:center;flex-shrink:0}
.sb-item-name{font-size:13px;font-weight:600;color:var(--sidebar-text)}
.sb-item.active .sb-item-name{color:#c9a84c}
.sb-divider{border:none;border-top:1px solid var(--sidebar3);margin:12px 4px}
.sb-players{margin-top:auto;padding-top:12px}
.sb-players-label{color:var(--sidebar-dim);font-size:9px;letter-spacing:1px;font-weight:700;text-align:center;margin-bottom:8px}
.sb-player-list{display:flex;justify-content:center;gap:8px}
.sb-player{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;
}
.sb-settings{
  margin-top:12px;padding:10px;border-radius:var(--r);min-height:44px;
  text-align:center;cursor:pointer;border:1px solid var(--sidebar3);
  color:var(--sidebar-dim);font-size:11px;display:flex;align-items:center;justify-content:center;
}
.sb-settings:active{background:var(--sidebar2);color:var(--sidebar-text)}

/* ══════════════════════════════════════════════
   MAIN AREA
   ══════════════════════════════════════════════ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{
  display:flex;align-items:center;gap:12px;
  padding:10px 20px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;min-height:50px;
}
.breadcrumb{font-size:13px;color:var(--ink3)}
.breadcrumb span{color:var(--ink);font-weight:600}
.topbar-spacer{flex:1}
.btn{
  padding:10px 16px;border-radius:var(--r);font-size:13px;
  font-weight:600;font-family:var(--font);cursor:pointer;
  border:1px solid var(--border);background:var(--surface);
  color:var(--ink2);display:inline-flex;align-items:center;gap:6px;
  min-height:44px;
}
.btn:active{background:var(--bg);border-color:var(--border2)}
.btn-gold{background:var(--gold-light);border-color:var(--gold);color:var(--gold)}
.btn-primary{background:var(--gold);border-color:var(--gold);color:#fff}
.btn-primary:active{background:#6a5808}
.content{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{display:none}

/* ══════════════════════════════════════════════
   VIEW SYSTEM
   ══════════════════════════════════════════════ */
.view{display:none}
.view.active{display:block}

/* ══════════════════════════════════════════════
   SECTION HEADERS
   ══════════════════════════════════════════════ */
.section-label{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--gold);margin-bottom:10px}
.section-desc{font-size:14px;color:var(--ink3);margin-bottom:16px;line-height:1.5}

/* ══════════════════════════════════════════════
   CAMPAIGN: BEATS
   ══════════════════════════════════════════════ */
.beats-row{display:flex;gap:8px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.beat-card{
  flex:0 0 190px;background:var(--surface);border:2px solid var(--border);
  border-radius:var(--r-lg);padding:14px 16px;cursor:pointer;
}
.beat-card:active{border-color:var(--gold)}
.beat-card.active{border-color:var(--gold);background:var(--gold-pale)}
.beat-card.dim{opacity:.4}
.beat-card .beat-num{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.5px}
.beat-card .beat-name{font-size:15px;font-weight:700;color:var(--ink);margin-top:4px;font-family:var(--serif)}
.beat-card .beat-status{font-size:11px;color:var(--ink3);margin-top:6px}
.beat-card .beat-bar{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.beat-card .beat-fill{height:100%;background:var(--gold);border-radius:2px}
.beat-connector{flex-shrink:0;display:flex;align-items:center;color:var(--border2);font-size:16px}

/* ══════════════════════════════════════════════
   CAMPAIGN: SCENE CARDS
   ══════════════════════════════════════════════ */
.scenes-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.scenes-header .section-label{margin:0}
.scene-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:24px}
.scene-card{
  background:var(--surface);border:2px solid var(--border);
  border-radius:var(--r-lg);padding:16px;cursor:pointer;
  position:relative;overflow:hidden;
}
.scene-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.scene-card.combat::before{background:var(--red)}
.scene-card.social::before{background:var(--blue)}
.scene-card.exploration::before{background:var(--green)}
.scene-card.revelation::before{background:var(--purple)}
.scene-card.sporadic::before{background:var(--gold)}
.scene-card.sporadic{border-style:dashed}
.scene-badge{display:inline-block;padding:3px 10px;border-radius:var(--r);font-size:11px;font-weight:700;margin-bottom:8px}
.badge-combat{background:var(--red-light);color:var(--red)}
.badge-social{background:var(--blue-light);color:var(--blue)}
.badge-exploration{background:var(--green-light);color:var(--green)}
.badge-revelation{background:var(--purple-light);color:var(--purple)}
.badge-sporadic{background:var(--gold-pale);color:var(--gold)}
.scene-status{float:right;font-size:10px;font-weight:600;padding:3px 8px;border-radius:var(--r)}
.status-debrief{background:var(--green-light);color:var(--green)}
.status-active{background:var(--gold-pale);color:var(--gold)}
.status-ready{background:var(--bg);color:var(--ink3)}
.scene-card .scene-name{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:6px;font-family:var(--serif)}
.scene-card .scene-detail{font-size:13px;color:var(--ink3);line-height:1.5;margin-bottom:2px}
.scene-flag{margin-top:10px;padding:8px 10px;border-radius:var(--r);font-size:12px;line-height:1.4;border:1px dashed}
.flag-consequence{background:rgba(176,40,40,.04);border-color:var(--red);color:var(--red)}
.flag-personal{background:rgba(96,48,160,.04);border-color:var(--purple);color:var(--purple)}

/* ══════════════════════════════════════════════
   SCENE BUILDER
   ══════════════════════════════════════════════ */
.builder-layout{display:flex;gap:16px}
.builder-main{flex:1;min-width:0}
.builder-side{width:280px;min-width:280px}
@media(max-width:900px){
  .builder-layout{flex-direction:column}
  .builder-side{width:100%;min-width:0}
}
.builder-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.builder-tab{
  padding:10px 16px;border-radius:var(--r);font-size:13px;
  font-weight:600;cursor:pointer;border:2px solid var(--border);
  background:var(--surface);color:var(--ink3);min-height:44px;
  display:flex;align-items:center;
}
.builder-tab:active{background:var(--bg)}
.builder-tab.active{background:var(--gold-light);border-color:var(--gold);color:var(--gold)}
.builder-tab.tab-debrief{color:var(--red)}
.builder-tab.tab-debrief.active{background:var(--red-light);border-color:var(--red);color:var(--red)}
.builder-panel{display:none}
.builder-panel.active{display:block}
.form-section{margin-bottom:20px}
.form-label{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--ink3);margin-bottom:8px}
.form-input{
  width:100%;padding:12px 14px;border:2px solid var(--border);
  border-radius:var(--r);font-size:15px;font-family:var(--font);
  color:var(--ink);background:var(--surface2);resize:vertical;
}
.form-input:focus{outline:none;border-color:var(--gold)}
.form-input::placeholder{color:var(--ink4)}
textarea.form-input{min-height:70px;line-height:1.5}
.stakes-row{display:flex;gap:10px}
@media(max-width:700px){.stakes-row{flex-direction:column}}
.stake-box{flex:1;padding:14px;border-radius:var(--r-lg);border:2px dashed}
.stake-fail{background:rgba(176,40,40,.03);border-color:var(--red)}
.stake-win{background:rgba(36,112,56,.03);border-color:var(--green)}
.stake-label{font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:8px}
.stake-fail .stake-label{color:var(--red)}
.stake-win .stake-label{color:var(--green)}
.stake-box .form-input{background:transparent;border-color:transparent}
.stake-box .form-input:focus{border-color:inherit}

/* TYPE SELECTOR — color dots, no emoji */
.type-selector{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.type-option{
  padding:10px 18px;border-radius:var(--r);border:2px solid var(--border);
  cursor:pointer;font-size:14px;font-weight:600;background:var(--surface);
  min-height:44px;display:flex;align-items:center;gap:8px;color:var(--ink2);
}
.type-option .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.type-option.selected{border-width:2px}
.type-option[data-type="combat"] .dot{background:var(--red)}
.type-option[data-type="social"] .dot{background:var(--blue)}
.type-option[data-type="exploration"] .dot{background:var(--green)}
.type-option[data-type="revelation"] .dot{background:var(--purple)}
.type-option[data-type="combat"].selected{border-color:var(--red);background:var(--red-light);color:var(--red)}
.type-option[data-type="social"].selected{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.type-option[data-type="exploration"].selected{border-color:var(--green);background:var(--green-light);color:var(--green)}
.type-option[data-type="revelation"].selected{border-color:var(--purple);background:var(--purple-light);color:var(--purple)}

/* ══════════════════════════════════════════════
   LAIR ACTIONS — checkboxes, not chips
   ══════════════════════════════════════════════ */
.lair-section{padding:14px;border-radius:var(--r-lg);background:var(--orange-light);border:2px dashed var(--orange)}
.lair-check{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:14px;color:var(--ink2);cursor:pointer}
.lair-check input[type="checkbox"]{width:20px;height:20px;accent-color:var(--orange)}
.combat-only{display:none}
.combat-only.visible{display:block}

/* ══════════════════════════════════════════════
   NPC / CREATURE / LOOT CARDS
   ══════════════════════════════════════════════ */
.npc-card,.creature-card,.loot-card{
  background:var(--surface);border:2px solid var(--border);
  border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px;
}
.npc-card .npc-name,.creature-card .creature-name,.loot-card .loot-name{font-size:15px;font-weight:700;font-family:var(--serif)}
.npc-card .npc-role,.creature-card .creature-type,.loot-card .loot-type{font-size:12px;color:var(--ink3);margin-top:2px}
.npc-card .npc-detail,.creature-card .creature-abilities,.loot-card .loot-desc{font-size:13px;color:var(--ink2);margin-top:8px;line-height:1.5}
.npc-card .npc-voice{font-size:14px;color:var(--gold);font-style:italic;margin-top:6px}
.creature-stats-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.creature-stat{padding:4px 10px;border-radius:var(--r);font-size:12px;font-weight:600;background:var(--bg);color:var(--ink2);border:1px solid var(--border)}
.creature-stat.hp{background:var(--red-light);color:var(--red);border-color:var(--red)}
.creature-stat.dmg{background:var(--orange-light);color:var(--orange);border-color:var(--orange)}
.creature-stat.special{background:var(--purple-light);color:var(--purple);border-color:var(--purple)}
.difficulty-tag{display:inline-block;padding:3px 10px;border-radius:var(--r);font-size:11px;font-weight:700}
.diff-easy{background:var(--green-light);color:var(--green)}
.diff-medium{background:var(--orange-light);color:var(--orange)}
.diff-hard{background:var(--red-light);color:var(--red)}
.diff-boss{background:var(--purple-light);color:var(--purple)}
.loot-card .loot-effect{font-size:13px;color:var(--gold);font-style:italic;margin-top:6px;padding:8px 12px;background:var(--gold-pale);border-radius:var(--r)}
.loot-rarity{display:inline-block;padding:3px 10px;border-radius:var(--r);font-size:11px;font-weight:700;float:right}
.rarity-common{background:var(--bg);color:var(--ink3)}
.rarity-uncommon{background:var(--green-light);color:var(--green)}
.rarity-rare{background:var(--blue-light);color:var(--blue)}
.rarity-legendary{background:var(--gold-pale);color:var(--gold)}
.loot-scene-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;margin-top:8px;padding:4px 8px;background:var(--bg);border-radius:var(--r);color:var(--ink3)}

/* VILLAIN */
.villain-card-lib{background:var(--surface);border:2px solid var(--red);border-left:5px solid var(--red);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px}
.villain-label{font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--red);margin-bottom:4px}
.villain-status{display:inline-block;padding:3px 10px;border-radius:var(--r);font-size:11px;font-weight:700}
.vs-active{background:var(--red-light);color:var(--red)}
.vs-prepared{background:var(--gold-pale);color:var(--gold)}

/* DIFFICULTY METER */
.difficulty-meter{padding:12px 14px;border-radius:var(--r-lg);border:2px solid var(--border);background:var(--surface2);margin-top:12px}
.difficulty-meter .dm-label{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--ink3);margin-bottom:8px}
.dm-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:6px}
.dm-fill{height:100%;border-radius:4px}
.dm-fill.medium{background:var(--orange);width:55%}
.dm-text{font-size:12px;display:flex;justify-content:space-between}

/* ══════════════════════════════════════════════
   LIBRARY
   ══════════════════════════════════════════════ */
.lib-category-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.lib-cat-tab{
  padding:10px 18px;border-radius:var(--r);font-size:13px;
  font-weight:600;cursor:pointer;border:2px solid var(--border);
  background:var(--surface);color:var(--ink3);min-height:44px;
  display:flex;align-items:center;gap:6px;
}
.lib-cat-tab:active{background:var(--bg)}
.lib-cat-tab.active{border-color:var(--gold);color:var(--gold);background:var(--gold-pale)}
.lib-cat-tab .tab-count{font-size:11px;background:var(--bg);padding:2px 8px;border-radius:10px;color:var(--ink4);font-weight:700}
.lib-cat-tab.active .tab-count{background:rgba(138,111,10,.12);color:var(--gold)}
.lib-content{display:none}
.lib-content.active{display:block}
.library-layout{display:flex;gap:16px;height:calc(100vh - 220px)}
@media(max-width:900px){
  .library-layout{flex-direction:column;height:auto}
  .library-list{width:100% !important;min-width:0 !important;max-height:300px}
}
.library-list{
  width:300px;min-width:300px;background:var(--surface);
  border:2px solid var(--border);border-radius:var(--r-lg);overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.library-list::-webkit-scrollbar{display:none}
.library-search{padding:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
.library-search input{
  width:100%;padding:10px 12px;border:2px solid var(--border);
  border-radius:var(--r);font-size:14px;font-family:var(--font);
}
.library-search input:focus{outline:none;border-color:var(--gold)}
.library-item{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;min-height:44px}
.library-item:active{background:var(--bg)}
.library-item.active{background:var(--gold-pale);border-left:4px solid var(--gold)}
.library-item .li-name{font-size:14px;font-weight:600}
.library-item .li-role{font-size:12px;color:var(--ink3);margin-top:2px}
.library-item .li-status{float:right}
.library-detail{
  flex:1;background:var(--surface);border:2px solid var(--border);
  border-radius:var(--r-lg);padding:24px;overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.library-detail::-webkit-scrollbar{display:none}
.detail-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--ink4);font-size:15px}
.detail-header{margin-bottom:20px}
.detail-name{font-size:22px;font-weight:700;font-family:var(--serif);color:var(--ink)}
.detail-role{font-size:14px;color:var(--ink3);margin-top:3px}
.detail-section{margin-bottom:16px}
.detail-section-label{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--ink3);margin-bottom:6px}
.detail-section-value{font-size:14px;color:var(--ink);line-height:1.6}
.detail-voice{
  font-size:15px;color:var(--gold);font-style:italic;
  padding:14px 18px;background:var(--gold-pale);border-radius:var(--r);
  border-left:4px solid var(--gold);margin-top:10px;font-family:var(--serif);
}
.creature-terrain{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--green);margin-right:12px}

/* ══════════════════════════════════════════════
   PLAYER CARDS
   ══════════════════════════════════════════════ */
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.player-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--r-lg);padding:18px 20px}
.player-card-header{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.player-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800}
.player-card-name{font-size:18px;font-weight:700;font-family:var(--serif)}
.player-card-class{font-size:13px;color:var(--ink3)}
.player-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.player-tag{padding:4px 10px;border-radius:var(--r);font-size:12px;font-weight:600;background:var(--bg);color:var(--ink2);border:1px solid var(--border)}
.player-tag.faction{background:var(--gold-pale);color:var(--gold);border-color:var(--gold)}
.player-objective{padding:10px 12px;border-radius:var(--r);background:var(--purple-light);border:1px dashed var(--purple);font-size:13px;color:var(--purple);line-height:1.5;margin-top:10px}
.player-objective-label{font-weight:700;font-size:10px;letter-spacing:.5px;margin-bottom:4px}
.echo-tracker{display:flex;align-items:center;gap:10px;margin-top:12px;padding:8px 12px;background:var(--gold-pale);border-radius:var(--r)}
.echo-tracker-label{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.5px}
.echo-dots{display:flex;gap:6px}
.echo-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:10px}
.echo-dot.filled{background:var(--gold);color:#fff}

/* ══════════════════════════════════════════════
   PLACEHOLDER
   ══════════════════════════════════════════════ */
.placeholder-view{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;text-align:center}
.placeholder-icon{font-size:48px;margin-bottom:16px;opacity:.3}
.placeholder-title{font-size:18px;font-weight:700;color:var(--ink3);margin-bottom:8px}
.placeholder-desc{font-size:14px;color:var(--ink4);max-width:400px;line-height:1.6}

/* ══════════════════════════════════════════════
   COMBAT TRACKER
   ══════════════════════════════════════════════ */
.tracker-bar{display:flex;align-items:center;gap:16px;padding:14px 16px;background:var(--surface);border:2px solid var(--border);border-radius:var(--r-lg);margin-bottom:16px;flex-wrap:wrap}
.tracker-stat{text-align:center;min-width:60px}
.tracker-stat-label{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--ink3)}
.tracker-stat-value{font-size:22px;font-weight:800;color:var(--ink)}
.tracker-stat-value.gold{color:var(--gold)}

.initiative-bar{display:flex;gap:6px;overflow-x:auto;padding:10px 0;-webkit-overflow-scrolling:touch}
.initiative-bar::-webkit-scrollbar{display:none}
.init-chip{
  flex-shrink:0;padding:8px 14px;border-radius:var(--r);
  font-size:13px;font-weight:600;border:2px solid var(--border);
  background:var(--surface);cursor:pointer;min-height:44px;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
}
.init-chip.active{border-color:var(--green);background:var(--green-light);color:var(--green)}
.init-chip.done{opacity:.4;text-decoration:line-through}
.init-chip.dead{opacity:.25;text-decoration:line-through}
.init-chip.player{border-color:var(--blue);color:var(--blue)}
.init-chip.player.active{border-color:var(--blue);background:var(--blue-light)}
.init-chip.sinergia-eligible{border-style:dashed;border-color:var(--gold)}

.unit-card-tracker{
  background:var(--surface);border:2px solid var(--border);
  border-radius:var(--r-lg);padding:16px;margin-bottom:10px;
}
.unit-card-tracker.active-unit{border-color:var(--green);background:#f4faf6}
.unit-card-tracker.dead-unit{opacity:.35}
.unit-header{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.unit-name{font-size:17px;font-weight:700;font-family:var(--serif)}
.unit-meta{font-size:12px;color:var(--ink3)}
.hp-section{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.hp-display{font-size:20px;font-weight:800;min-width:80px}
.hp-bar{flex:1;min-width:120px;height:10px;background:var(--border);border-radius:5px;overflow:hidden}
.hp-fill{height:100%;border-radius:5px;transition:width .2s}
.hp-controls{display:flex;gap:6px;align-items:center}
.hp-controls input{width:70px;padding:8px 10px;border:2px solid var(--border);border-radius:var(--r);font-size:15px;text-align:center;font-family:var(--font)}
.hp-controls input:focus{outline:none;border-color:var(--gold)}
.btn-damage{background:var(--red-light);border-color:var(--red);color:var(--red);min-height:44px}
.btn-heal{background:var(--green-light);border-color:var(--green);color:var(--green);min-height:44px}
.actions-row{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;align-items:center}
.action-check{display:flex;align-items:center;gap:8px;font-size:14px;min-height:44px;cursor:pointer}
.action-check input[type="checkbox"]{width:22px;height:22px}
.conditions-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.condition-tag{padding:4px 10px;border-radius:var(--r);font-size:11px;font-weight:600;background:var(--red-light);color:var(--red)}
.abilities-compact{margin-top:10px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r)}
.ability-line{font-size:13px;color:var(--ink2);padding:4px 0;border-bottom:1px solid var(--border)}
.ability-line:last-child{border:none}
.ability-name{font-weight:700;color:var(--ink)}

.lair-panel{background:var(--orange-light);border:2px dashed var(--orange);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px}
.lair-panel .form-label{color:var(--orange)}
.lair-action-btn{
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  background:var(--surface);border:2px solid var(--border);border-radius:var(--r);
  font-size:14px;cursor:pointer;min-height:44px;width:100%;margin-bottom:6px;
  color:var(--ink2);
}
.lair-action-btn:active{background:var(--orange-light);border-color:var(--orange)}
.lair-action-btn.used{opacity:.35;text-decoration:line-through}

.echo-panel{background:var(--gold-pale);border:2px solid var(--gold);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px}
.echo-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(138,111,10,.15);min-height:44px}
.echo-row:last-child{border:none}
.echo-player-name{font-size:15px;font-weight:600}
.echo-btn{
  padding:8px 14px;border-radius:var(--r);font-size:14px;font-weight:700;
  background:var(--gold);color:#fff;border:none;cursor:pointer;min-height:44px;
}
.echo-btn:active{background:#6a5808}
.echo-count{font-size:18px;font-weight:800;color:var(--gold);min-width:30px;text-align:center}

.no-session{display:flex;flex-direction:column;align-items:center;justify-content:center;height:50vh;text-align:center;gap:16px}
.no-session-title{font-size:18px;font-weight:700;color:var(--ink3)}
.no-session-desc{font-size:14px;color:var(--ink4);max-width:400px;line-height:1.6}

/* ══════════════════════════════════════════════
   UTILITIES
   ══════════════════════════════════════════════ */
.flex-between{display:flex;align-items:center;justify-content:space-between}
.mb-16{margin-bottom:16px}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border:2px solid var(--border);border-radius:var(--r-lg);width:100%;max-width:600px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px}
.modal::-webkit-scrollbar{display:none}
.modal-title{font-size:18px;font-weight:700;font-family:var(--serif);margin-bottom:16px;color:var(--ink)}
.modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.form-row{display:flex;gap:12px}
.form-row>*{flex:1}
.empty-state{text-align:center;padding:40px 20px;color:var(--ink4)}
.empty-state-title{font-size:16px;font-weight:600;color:var(--ink3);margin-bottom:8px}
.empty-state-desc{font-size:14px;margin-bottom:16px;line-height:1.5}
.entity-list-item{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;min-height:44px;display:flex;align-items:center;justify-content:space-between}
.entity-list-item:active{background:var(--bg)}
.entity-list-item.selected{background:var(--gold-pale);border-left:4px solid var(--gold)}
.delete-btn{color:var(--red);background:none;border:none;font-size:18px;cursor:pointer;padding:4px 8px;min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center}
.inline-edit{background:var(--surface2);border:2px solid var(--border);border-radius:var(--r);padding:10px 12px;font-size:14px;width:100%;font-family:var(--font);color:var(--ink)}
.inline-edit:focus{outline:none;border-color:var(--gold)}
.tag-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.move-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:14px}
.move-item input[type=checkbox]{width:20px;height:20px}
.move-done{text-decoration:line-through;color:var(--ink4)}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sb-brand"><div class="sb-brand-name">EPIC</div><div class="sb-brand-sub">STORY MASTER</div></div>
  <div class="sb-campaign" id="sb-campaign-info"></div>
  <nav class="sb-nav">
    <div class="sb-item active" data-action="nav" data-type="campaign"><div class="sb-item-icon">📜</div><div class="sb-item-name">Campaña</div></div>
    <div class="sb-item" data-action="nav" data-type="scenes"><div class="sb-item-icon">🎬</div><div class="sb-item-name">Escenas</div></div>
    <div class="sb-item" data-action="nav" data-type="library"><div class="sb-item-icon">📖</div><div class="sb-item-name">Biblioteca</div></div>
    <div class="sb-item" data-action="nav" data-type="players"><div class="sb-item-icon">👥</div><div class="sb-item-name">Personajes</div></div>
    <div class="sb-item" data-action="nav" data-type="session"><div class="sb-item-icon">⚡</div><div class="sb-item-name">Sesión en Vivo</div></div>
  </nav>
  <hr class="sb-divider">
  <div class="sb-players" id="sb-players-bar"></div>
  <div class="sb-settings" data-action="nav" data-type="settings">⚙️ Configuración</div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="topbar-spacer"></div>
    <button class="btn btn-gold" data-action="open-modal" data-type="scene">+ Escena rápida</button>
  </div>
  <div class="content">
    <div class="view active" id="view-campaign"><div id="campaign-content"></div></div>
    <div class="view" id="view-scenes"><div id="scenes-content"></div></div>
    <div class="view" id="view-library"><div id="library-content"></div></div>
    <div class="view" id="view-players"><div id="players-content"></div></div>
    <div class="view" id="view-session"><div id="session-content"></div></div>
    <div class="view" id="view-settings"><div id="settings-content"></div></div>
  </div>
</div>
<div id="modal-root"></div>
<script src="gamedata.js"></script>
<script>
/* DB LAYER */
var DB_PREFIX='eqsm_';
var DB_TABLES=['campaign','sessions','scenes','npcs','villains','bestiary','loot','players'];
function dbKey(t){return DB_PREFIX+t}
function dbLoad(t){try{var d=localStorage.getItem(dbKey(t));return d?JSON.parse(d):null}catch(e){return null}}
function dbSave(t,d){try{localStorage.setItem(dbKey(t),JSON.stringify(d));return true}catch(e){return false}}
function dbGetAll(t){return dbLoad(t)||[]}
function dbGetById(t,id){return dbGetAll(t).find(function(i){return i.id===id})||null}
function dbCreate(t,item){var items=dbGetAll(t);if(!item.id)item.id=t.substring(0,3)+'-'+Date.now().toString(36);items.push(item);dbSave(t,items);return item}
function dbUpdate(t,id,up){var items=dbGetAll(t);var idx=items.findIndex(function(i){return i.id===id});if(idx===-1)return;Object.keys(up).forEach(function(k){items[idx][k]=up[k]});dbSave(t,items);return items[idx]}
function dbDelete(t,id){dbSave(t,dbGetAll(t).filter(function(i){return i.id!==id}))}
function seedIfEmpty(){if(dbLoad('_init'))return;DB_TABLES.forEach(function(t){if(!dbLoad(t))dbSave(t,t==='campaign'?null:[])});dbSave('_init',true)}
seedIfEmpty();

/* STATE */
var currentView='campaign',selectedLibTab='npcs',selectedLibItem=null,selectedSceneId=null,selectedBeatIdx=0;
var combat=null,expandedUnits={};
var G=(typeof GAMEDATA!=='undefined')?GAMEDATA:null;

/* HELPERS */
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,4)}
function resolvePlayer(p){if(!p)return null;var cls=G?G.classes.find(function(c){return c.id===p.classId}):null;var sub=cls?cls.subclasses.find(function(s){return s.id===p.subclassId}):null;var kit=G?G.kits.find(function(k){return k.id===p.kitId}):null;var fac=G?G.factions.find(function(f){return f.id===p.factionId}):null;var ab=[];if(cls)cls.abilities.forEach(function(a){ab.push(a)});if(sub)sub.abilities.forEach(function(a){ab.push(a)});if(kit)ab.push({name:kit.ability.name,type:'Kit',desc:kit.ability.desc,cost:kit.ability.cost});return{id:p.id,name:p.name,initial:p.initial||p.name.charAt(0),bg:p.bg||'#444',fg:p.fg||'#fff',echo:p.echo||0,cls:cls?cls.nameEs:(p.classId||'?'),sub:sub?sub.name:'',kit:kit?kit.name:'',plano:p.plano||1,faction:fac?fac.name:(p.factionId||''),factionColor:fac?fac.color:'#666',hp:(G?G.rules.hpBase:10)+(kit?kit.hpBonus:0),aenRegen:(G?G.rules.aenPerTurn:2)+(kit?kit.aenBonus:0),abilities:ab,backstory:p.backstory||''}}
function hpColor(pct){if(pct>60)return'var(--green)';if(pct>25)return'var(--orange)';return'var(--red)'}
function diffLabel(d){return{easy:'Fácil',medium:'Medio',hard:'Duro',boss:'Jefe'}[d]||d}
function rarCls(r){return'rarity-'+(r||'common')}

/* GLOBAL CLICK HANDLER — no more onclick escaping issues */
document.addEventListener('click',function(e){
  var el=e.target.closest('[data-action]');
  if(!el)return;
  var a=el.dataset.action,t=el.dataset.type,id=el.dataset.id||null;
  if(a==='open-modal'){e.preventDefault();openModal(t,id)}
  if(a==='nav'){nav(t)}
  if(a==='delete-item'){e.stopPropagation();if(confirm('¿Eliminar?')){dbDelete(t,id);selectedLibItem=null;renderView(currentView)}}
  if(a==='select-lib'){selectedLibItem=id;renderLibrary()}
  if(a==='select-scene'){selectedSceneId=id;nav('scenes')}
  if(a==='select-beat'){selectedBeatIdx=parseInt(el.dataset.idx);renderCampaign()}
  if(a==='start-combat'){e.stopPropagation();startCombatFromScene(id)}
  if(a==='save-debrief'){saveDebrief(id)}
  if(a==='add-beat'){addBeat()}
  if(a==='add-echo'){adjustEcho(id,1)}
  if(a==='next-turn'){nextTurn()}
  if(a==='end-combat'){endCombat()}
  if(a==='expand-unit'){toggleExpand(id)}
  if(a==='use-lair'){useLairAction(id)}
  if(a==='add-echo-tracker'){addEchoTracker(id)}
  if(a==='toggle-move'){toggleMove(el.dataset.villainId,el.dataset.moveText)}
  if(a==='adjust-hp'){var v=parseInt(document.getElementById('hp-'+id).value)||0;var sign=parseInt(el.dataset.sign);adjustHp(id,v*sign);document.getElementById('hp-'+id).value=''}
  if(a==='toggle-action'){toggleAction(id,el.dataset.act)}
  if(a==='close-modal'){closeModal()}
  if(a==='save-modal'){saveModal(el.dataset.type,el.dataset.id==='null'?null:el.dataset.id)}
  if(a==='export-db'){exportDB(t)}
  if(a==='export-all'){exportAll()}
  if(a==='reset-all'){if(confirm('¿Borrar TODO?')){DB_TABLES.forEach(function(t){localStorage.removeItem(dbKey(t))});localStorage.removeItem(dbKey('_init'));location.reload()}}
});

/* NAV */
var crumbs={campaign:'📜 <span>Campaña</span>',scenes:'🎬 <span>Scene Builder</span>',library:'📖 <span>Biblioteca</span>',players:'👥 <span>Personajes</span>',session:'⚡ <span>Sesión en Vivo</span>',settings:'⚙️ <span>Configuración</span>'};
function nav(id){currentView=id;document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active')});var t=document.getElementById('view-'+id);if(t)t.classList.add('active');document.querySelectorAll('.sb-item').forEach(function(i){i.classList.remove('active')});var items=document.querySelectorAll('.sb-item');var map={campaign:0,scenes:1,library:2,players:3,session:4};if(map[id]!==undefined&&items[map[id]])items[map[id]].classList.add('active');document.getElementById('breadcrumb').innerHTML=crumbs[id]||'';renderView(id)}
function renderView(id){renderSidebar();if(id==='campaign')renderCampaign();if(id==='scenes')renderSceneBuilder(selectedSceneId);if(id==='library')renderLibrary();if(id==='players')renderPlayers();if(id==='session')renderSession();if(id==='settings')renderSettings()}
function renderSidebar(){var camp=dbLoad('campaign');var ci=document.getElementById('sb-campaign-info');if(ci){ci.innerHTML=camp?'<div class="sb-campaign-label">CAMPAÑA ACTIVA</div><div class="sb-campaign-name">'+camp.name+'</div>':'<div class="sb-campaign-label">SIN CAMPAÑA</div>'}var pb=document.getElementById('sb-players-bar');if(pb){var pls=dbGetAll('players');if(!pls.length){pb.innerHTML=''}else{var h='<div class="sb-players-label">EN MESA</div><div class="sb-player-list">';pls.forEach(function(p){h+='<div class="sb-player" style="background:'+(p.bg||'#444')+';color:'+(p.fg||'#fff')+'" title="'+p.name+'">'+(p.initial||p.name.charAt(0))+'</div>'});h+='</div>';pb.innerHTML=h}}}

/* CAMPAIGN */
function renderCampaign(){var el=document.getElementById('campaign-content');if(!el)return;var camp=dbLoad('campaign');if(!camp){el.innerHTML='<div class="empty-state"><div class="empty-state-title">No hay campaña activa</div><div class="empty-state-desc">Crea una campaña para empezar.</div><button class="btn btn-primary" data-action="open-modal" data-type="campaign">Crear campaña</button></div>';return}var h='<div class="section-label">'+camp.name+'</div>';var arc=(camp.arcs||[])[0]||{beats:[]};h+='<div class="beats-row">';(arc.beats||[]).forEach(function(b,i){h+='<div class="beat-card'+(i===selectedBeatIdx?' active':'')+'" data-action="select-beat" data-idx="'+i+'"><div class="beat-num">BEAT '+(i+1)+'</div><div class="beat-name">'+b.name+'</div></div>';if(i<arc.beats.length-1)h+='<div class="beat-connector">—</div>'});h+='<div style="flex-shrink:0;display:flex;align-items:center"><button class="btn" data-action="add-beat">+</button></div></div>';var scenes=dbGetAll('scenes');var beat=arc.beats[selectedBeatIdx];var beatScenes=beat?scenes.filter(function(s){return(beat.scenes||[]).indexOf(s.id)>-1}):[];var allAssigned=[];(camp.arcs||[]).forEach(function(a){(a.beats||[]).forEach(function(b){allAssigned=allAssigned.concat(b.scenes||[])})});var unassigned=scenes.filter(function(s){return allAssigned.indexOf(s.id)===-1});h+='<div class="scenes-header flex-between"><div class="section-label" style="margin:0">ESCENAS'+(beat?' — '+beat.name:'')+'</div><button class="btn" data-action="open-modal" data-type="scene">+ Nueva escena</button></div>';var display=beat?beatScenes.concat(unassigned):scenes;if(!display.length){h+='<div class="empty-state"><div class="empty-state-desc">No hay escenas. Crea la primera.</div></div>'}else{h+='<div class="scene-grid">';display.forEach(function(s){var tc=s.type==='combat'?'combat':'social';h+='<div class="scene-card '+tc+'" data-action="select-scene" data-id="'+s.id+'"><span class="scene-badge '+(s.type==='combat'?'badge-combat':'badge-social')+'">'+(s.type==='combat'?'Combate':'Narrativa')+'</span>';if(s.sporadic)h+=' <span style="font-size:11px;color:var(--gold)">(esporádica)</span>';h+='<div class="scene-name">'+s.name+'</div>';if(s.setup&&s.setup.hook)h+='<div class="scene-detail">'+s.setup.hook+'</div>';if(s.type==='combat')h+='<button class="btn btn-primary" style="margin-top:10px;width:100%;justify-content:center" data-action="start-combat" data-id="'+s.id+'">Iniciar combate</button>';if(s.debrief&&s.debrief.consequences)(s.debrief.consequences).forEach(function(c){h+='<div class="scene-flag flag-consequence">⚠ '+c+'</div>'});h+='</div>'});h+='</div>'}el.innerHTML=h}
function addBeat(){var camp=dbLoad('campaign');if(!camp)return;var name=prompt('Nombre del beat:');if(!name)return;if(!camp.arcs)camp.arcs=[{id:'arc-1',name:'Arco I',beats:[]}];camp.arcs[0].beats.push({id:'beat-'+uid(),name:name,scenes:[]});dbSave('campaign',camp);renderCampaign()}

/* LIBRARY */
function renderLibrary(){var el=document.getElementById('library-content');if(!el)return;var tabs=[{id:'npcs',l:'NPCs'},{id:'villains',l:'Villanos'},{id:'bestiary',l:'Bestiario'},{id:'loot',l:'Loot'}];var h='<div class="section-label">BIBLIOTECA</div><div class="lib-category-tabs">';tabs.forEach(function(t){h+='<div class="lib-cat-tab'+(selectedLibTab===t.id?' active':'')+'" data-action="nav" data-type="library" onclick="selectedLibTab=\''+t.id+'\';selectedLibItem=null;renderLibrary()">'+t.l+' <span class="tab-count">'+dbGetAll(t.id).length+'</span></div>'});h+='</div>';var tl={npcs:'NPC',villains:'Villano',bestiary:'Criatura',loot:'Item'}[selectedLibTab];h+='<div style="margin-bottom:12px"><button class="btn btn-primary" data-action="open-modal" data-type="'+selectedLibTab+'">+ Nuevo '+tl+'</button></div>';h+='<div class="library-layout"><div class="library-list"><div class="library-search"><input type="text" placeholder="Buscar..." oninput="filterLib(this.value)"></div><div id="lib-items">';h+=renderLibList(dbGetAll(selectedLibTab));h+='</div></div><div class="library-detail" id="lib-detail">';h+=selectedLibItem?renderLibDetail(selectedLibTab,selectedLibItem):'<div class="empty-state"><div class="empty-state-desc">Selecciona un item</div></div>';h+='</div></div>';el.innerHTML=h}

function renderLibDetail(table,id){var item=dbGetById(table,id);if(!item)return'';var h='<div style="display:flex;justify-content:space-between;align-items:start"><div class="detail-header"><div class="detail-name">'+item.name+'</div>';if(item.role)h+='<div class="detail-role">'+item.role+'</div>';h+='</div><button class="btn" data-action="open-modal" data-type="'+table+'" data-id="'+item.id+'">Editar</button></div>';var fields=[];if(table==='npcs')fields=[['MOTIVACIÓN','motivation'],['LO QUE SABE','knows'],['LO QUE QUIERE','wants']];if(table==='villains'){fields=[['MOTIVACIÓN','motivation'],['ARCO','arc']];if(item.stats)h+='<div class="detail-section"><div class="detail-section-label">STATS</div><div class="creature-stats-row"><span class="creature-stat hp">HP '+(item.stats.hp||0)+'</span><span class="creature-stat dmg">'+( item.stats.dmg||'?')+'</span></div></div>'}if(table==='bestiary'){fields=[['DESCRIPCIÓN','description']];h+='<div class="detail-section"><div class="detail-section-label">STATS</div><div class="creature-stats-row"><span class="creature-stat hp">HP '+(item.hp||0)+'</span><span class="creature-stat dmg">'+(item.dmg||'?')+'</span></div></div>'}if(table==='loot')fields=[['DESCRIPCIÓN','description'],['EFECTO','effect']];fields.forEach(function(f){if(item[f[1]])h+='<div class="detail-section"><div class="detail-section-label">'+f[0]+'</div><div class="detail-section-value">'+item[f[1]]+'</div></div>'});if(item.voice)h+='<div class="detail-voice">"'+item.voice+'"</div>';if(item.abilities&&item.abilities.length){h+='<div class="detail-section"><div class="detail-section-label">HABILIDADES</div>';item.abilities.forEach(function(a){h+='<div class="ability-line"><span class="ability-name">'+a.name+'</span> ['+a.type+']<div style="font-size:13px;color:var(--ink3)">'+a.desc+'</div></div>'});h+='</div>'}return h}
function filterLib(q){var items=dbGetAll(selectedLibTab);if(q)items=items.filter(function(i){return i.name.toLowerCase().indexOf(q.toLowerCase())>-1});document.getElementById('lib-items').innerHTML=renderLibList(items)}

function startCombatFromScene(sid){var scene=dbGetById('scenes',sid);if(!scene)return;var units=[];expandedUnits={};dbGetAll('players').forEach(function(p){var r=resolvePlayer(p);units.push({id:p.id,name:r.name,type:'player',initial:r.initial,bg:r.bg,fg:r.fg,cls:r.cls,plano:r.plano,abilities:r.abilities,hp:0,hpMax:0,actions:{mov:false,act1:false,act2:false}})});if(scene.participants&&scene.participants.creatureIds)scene.participants.creatureIds.forEach(function(ci){var c=dbGetById('bestiary',ci.creatureId);if(!c)return;for(var i=1;i<=ci.qty;i++)units.push({id:c.id+'-'+i,name:c.name+(ci.qty>1?' #'+i:''),type:'creature',hp:c.hp,hpMax:c.hp,dmg:c.dmg||'',resist:c.resist||'',diff:c.difficulty||'medium',abilities:c.abilities||[],actions:{mov:false,act1:false,act2:false}})});combat={name:scene.name,round:1,turnIndex:0,units:units,order:units.map(function(u){return u.id}),lairActions:(scene.lairActions||[]).map(function(la,i){return{id:'la'+i,text:la,used:false}})};nav('session')}

function renderSettings(){var el=document.getElementById('settings-content');if(!el)return;var h='<div class="section-label">CONFIGURACIÓN</div><div style="background:var(--surface);border:2px solid var(--border);border-radius:var(--r-lg);padding:18px;margin-bottom:16px"><div class="form-label">GAME DATA</div><div style="font-size:14px;color:var(--ink2);line-height:1.8">';if(G)h+='Clases: '+G.classes.length+' ('+G.classes.reduce(function(a,c){return a+c.subclasses.length},0)+' subclases)<br>Facciones: '+G.factions.length+'<br>Kits: '+G.kits.length;else h+='⚠ gamedata.js no cargado — colócalo junto a index.html';h+='<br><br>';DB_TABLES.forEach(function(t){var d=dbLoad(t);h+=t+': '+(Array.isArray(d)?d.length:(d?1:0))+'<br>'});h+='</div></div>';h+='<div style="background:var(--surface);border:2px solid var(--border);border-radius:var(--r-lg);padding:18px;margin-bottom:16px"><div class="form-label">EXPORTAR</div><div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">';DB_TABLES.forEach(function(t){h+='<button class="btn" data-action="export-db" data-type="'+t+'">'+t+'</button>'});h+='<button class="btn btn-primary" data-action="export-all">Todo</button></div></div>';h+='<div style="background:var(--surface);border:2px solid var(--border);border-radius:var(--r-lg);padding:18px;margin-bottom:16px"><div class="form-label">IMPORTAR</div><input type="file" accept=".json" style="font-size:14px;margin-top:8px" onchange="importFile(this)"><div id="import-status" style="margin-top:8px;font-size:13px"></div></div>';h+='<div style="background:var(--surface);border:2px solid var(--red);border-radius:var(--r-lg);padding:18px"><div class="form-label" style="color:var(--red)">ZONA DE PELIGRO</div><button class="btn" style="border-color:var(--red);color:var(--red);margin-top:8px" data-action="reset-all">Resetear datos</button></div>';el.innerHTML=h}

function importFile(input){var f=input.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){try{var d=JSON.parse(e.target.result);var imported=[];if(d.campaign||d.npcs){DB_TABLES.forEach(function(t){if(d[t]){dbSave(t,d[t]);imported.push(t)}});document.getElementById('import-status').innerHTML='✅ '+imported.join(', ')}else if(Array.isArray(d)){var n=f.name.replace('eq_','').replace('.json','');if(DB_TABLES.includes(n)){dbSave(n,d);document.getElementById('import-status').innerHTML='✅ '+n}}}catch(err){document.getElementById('import-status').innerHTML='❌ '+err.message}input.value=''};r.readAsText(f)}

function fld(label,name,val,ph,ta){var h='<div class="form-section"><div class="form-label">'+label+'</div>';if(ta)h+='<textarea class="form-input" id="f-'+name+'" placeholder="'+(ph||'')+'">'+(val||'')+'</textarea>';else h+='<input class="form-input" id="f-'+name+'" type="text" value="'+String(val||'').replace(/"/g,'&quot;')+'" placeholder="'+(ph||'')+'">';return h+'</div>'}
function sel(label,name,opts,val){var h='<div class="form-section"><div class="form-label">'+label+'</div><select class="form-input" id="f-'+name+'">';opts.forEach(function(o){h+='<option value="'+o.v+'"'+(val===o.v?' selected':'')+'>'+o.l+'</option>'});return h+'</select></div>'}
function getFields(type,v){var h='';if(type==='campaign')h+=fld('Nombre','name',v.name,'Nombre de la campaña');if(type==='scene'){h+=fld('Nombre','name',v.name,'');h+=sel('Tipo','type',[{v:'combat',l:'Combate'},{v:'narrative',l:'Narrativa'}],v.type||'narrative');h+=fld('Hook','hook',v.setup?v.setup.hook:'','¿Cómo abre?',1);h+=fld('Conflicto','conflict',v.setup?v.setup.conflict:'','¿Qué hay que resolver?',1);h+=fld('Si fallan','stakesFail',v.setup?v.setup.stakesFail:'','');h+=fld('Si triunfan','stakesWin',v.setup?v.setup.stakesWin:'','');h+=fld('Beat de salida','exit',v.setup?v.setup.exit:'','',1);h+=fld('Lair Actions (una por línea)','lairActions',(v.lairActions||[]).join('\n'),'',1);h+=fld('Notas','notes',v.notes,'',1)}if(type==='npcs'){h+=fld('Nombre','name',v.name,'');h+=fld('Rol','role',v.role,'Ej: Comerciante');h+=fld('Raza','race',v.race,'');h+=fld('Motivación','motivation',v.motivation,'',1);h+=fld('Lo que sabe','knows',v.knows,'',1);h+=fld('Lo que quiere','wants',v.wants,'',1);h+=fld('Voz','voice',v.voice,'Frase ejemplo')}if(type==='villains'){h+=fld('Nombre','name',v.name,'');h+=fld('Rol','role',v.role,'');h+=sel('Estado','status',[{v:'prepared',l:'Preparado'},{v:'active',l:'Activo'}],v.status||'prepared');h+=fld('Motivación','motivation',v.motivation,'',1);h+=fld('Arco','arc',v.arc,'',1);h+=fld('HP','hp',v.stats?v.stats.hp:'','');h+=fld('Daño','dmg',v.stats?v.stats.dmg:'','Ej: 8-14');h+=fld('Especial','special',v.stats?v.stats.special:'','');h+=fld('Resistencia','resist',v.stats?v.stats.resist:'','')}if(type==='bestiary'){h+=fld('Nombre','name',v.name,'');if(G){h+=sel('Tipo','btype',G.creatureTypes.map(function(t){return{v:t,l:t}}),v.type||'Bestia');h+=sel('Dificultad','difficulty',G.difficulties.map(function(d){return{v:d.id,l:d.name}}),v.difficulty||'medium')}else{h+=fld('Tipo','btype',v.type,'');h+=fld('Dificultad','difficulty',v.difficulty,'')}h+=fld('HP','hp',v.hp,'');h+=fld('Daño','dmg',v.dmg,'Ej: 4-8');h+=fld('Resistencia','resist',v.resist,'');h+=fld('Terreno','terrain',(v.terrain||[]).join(', '),'Bosque, Cueva');h+=fld('Descripción','description',v.description,'',1)}if(type==='loot'){h+=fld('Nombre','name',v.name,'');h+=sel('Tipo','ltype',[{v:'Arma',l:'Arma'},{v:'Narrativo',l:'Narrativo'},{v:'Información',l:'Información'},{v:'Consumible',l:'Consumible'}],v.type||'Consumible');if(G)h+=sel('Rareza','rarity',G.rarities.map(function(r){return{v:r.id,l:r.name}}),v.rarity||'common');h+=fld('Descripción','description',v.description,'',1);h+=fld('Efecto','effect',v.effect,'',1)}if(type==='players'){h+=fld('Nombre','name',v.name,'');h+=fld('Inicial','initial',v.initial||'','Letra');h+=fld('Color fondo','bg',v.bg||'#2d3a5e','#hex');h+=fld('Color texto','fg',v.fg||'#8aa4d4','#hex');if(G){h+=sel('Facción','factionId',G.factions.map(function(f){return{v:f.id,l:f.name}}),v.factionId||'');h+=sel('Clase','classId',G.classes.map(function(c){return{v:c.id,l:c.nameEs+' ('+c.type+')'}}),v.classId||'');var subs=[];G.classes.forEach(function(c){c.subclasses.forEach(function(s){subs.push({v:s.id,l:c.nameEs+' → '+s.name})})});h+=sel('Subclase','subclassId',subs,v.subclassId||'');h+=sel('Kit','kitId',G.kits.map(function(k){return{v:k.id,l:k.name+' ('+k.fantasy+')'}}),v.kitId||'')}h+=fld('Plano','plano',v.plano||1,'1-4');h+=fld('Backstory','backstory',v.backstory||'','',1)}return h}
function saveModal(type,id){function gv(n){var el=document.getElementById('f-'+n);return el?el.value.trim():''}var item;if(type==='campaign'){item={id:id||'camp-'+uid(),name:gv('name'),arcs:[{id:'arc-1',name:'Arco I',beats:[]}]};dbSave('campaign',item);closeModal();nav('campaign');return}if(type==='scene'){item={name:gv('name'),type:gv('type'),status:'ready',sporadic:false,setup:{hook:gv('hook'),conflict:gv('conflict'),stakesFail:gv('stakesFail'),stakesWin:gv('stakesWin'),exit:gv('exit')},participants:{npcIds:[],creatureIds:[]},lairActions:gv('lairActions').split('\n').filter(function(l){return l.trim()}),objectives:{},notes:gv('notes'),debrief:null};if(id){dbUpdate('scenes',id,item)}else{item.id='sce-'+uid();dbCreate('scenes',item);selectedSceneId=item.id}closeModal();nav('scenes');return}if(type==='npcs')item={name:gv('name'),role:gv('role'),race:gv('race'),motivation:gv('motivation'),knows:gv('knows'),wants:gv('wants'),voice:gv('voice'),appearsIn:[],tags:[]};if(type==='villains')item={name:gv('name'),role:gv('role'),status:gv('status'),motivation:gv('motivation'),arc:gv('arc'),stats:{hp:parseInt(gv('hp'))||0,dmg:gv('dmg'),special:gv('special'),resist:gv('resist')},abilities:[],moves:[]};if(type==='bestiary')item={name:gv('name'),type:gv('btype'),difficulty:gv('difficulty'),hp:parseInt(gv('hp'))||10,dmg:gv('dmg'),resist:gv('resist'),terrain:gv('terrain').split(',').map(function(t){return t.trim()}).filter(Boolean),description:gv('description'),abilities:[],lairSuggestions:[]};if(type==='loot')item={name:gv('name'),type:gv('ltype'),rarity:gv('rarity'),description:gv('description'),effect:gv('effect'),delivered:false};if(type==='players'){item={name:gv('name'),initial:gv('initial')||gv('name').charAt(0),bg:gv('bg'),fg:gv('fg'),factionId:gv('factionId'),classId:gv('classId'),subclassId:gv('subclassId'),kitId:gv('kitId'),plano:parseInt(gv('plano'))||1,backstory:gv('backstory'),echo:0};if(id){var old=dbGetById('players',id);if(old)item.echo=old.echo}}if(id)dbUpdate(type==='scene'?'scenes':type,id,item);else dbCreate(type==='scene'?'scenes':type,item);closeModal();renderView(currentView)}
